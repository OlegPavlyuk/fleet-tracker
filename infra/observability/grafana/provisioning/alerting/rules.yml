apiVersion: 1

# All rules start in observe-only mode (no contact points configured).
# Thresholds are placeholders — tune from Phase 2 baseline data.
groups:
  - orgId: 1
    name: fleet-tracker-pipeline
    folder: Fleet Tracker
    interval: 1m
    rules:
      - uid: fleet-ingress-broadcast-latency
        title: High ingress-to-broadcast p95 latency
        condition: C
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: 'p95 server_ingress_to_broadcast_ms > 250ms for 1m'
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: histogram_quantile(0.95, sum(rate(server_ingress_to_broadcast_ms_bucket[5m])) by (le))
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [250]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              refId: C
              type: classic_conditions

      - uid: fleet-persist-queue-depth
        title: Persist queue depth high
        condition: C
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: 'persist_queue_size > 800 for 30s'
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: persist_queue_size
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [800]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              refId: C
              type: classic_conditions

      - uid: fleet-persist-drops
        title: Telemetry data loss detected
        condition: C
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: 'rate(persist_dropped_total[1m]) > 0 — any drop is data loss'
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: rate(persist_dropped_total[1m])
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              refId: C
              type: classic_conditions

      - uid: fleet-broadcast-failures
        title: Broadcast send failures
        condition: C
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: 'rate(broadcast_send_failures_total[1m]) > 1'
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: rate(broadcast_send_failures_total[1m])
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              refId: C
              type: classic_conditions

      - uid: fleet-validate-invalid-rate
        title: High invalid telemetry rate
        condition: C
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: 'rate(ingest_messages_total{result="invalid"}[1m]) > 5/s for 2m'
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: rate(ingest_messages_total{result="invalid"}[1m])
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              refId: C
              type: classic_conditions

      - uid: fleet-eventloop-lag
        title: Event-loop lag warning
        condition: C
        noDataState: NoData
        execErrState: Error
        for: 30s
        annotations:
          summary: 'nodejs_eventloop_lag_seconds > 0.05 for 30s — early warning'
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: nodejs_eventloop_lag_seconds
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              refId: C
              type: classic_conditions
