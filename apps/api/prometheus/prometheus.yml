global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /metrics
    authorization:
      # Must match METRICS_TOKEN in .env
      # Default value for docker-compose dev workflow: change-me-metrics-token-min16chars
      credentials: change-me-metrics-token-min16chars
